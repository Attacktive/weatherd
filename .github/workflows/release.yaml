name: 'Release'
on:
  push:
    tags: ['**']

jobs:
  release:
    name: 'Release'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v7'
        with:
          fetch-depth: 0

      - name: 'Set up JDK'
        uses: 'actions/setup-java@v5'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 'Decode keystore'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: 'Build release APK and AAB'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: './gradlew assembleRelease bundleRelease'

      - name: 'Rename artifacts'
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Weatherd-${{ github.ref_name }}.apk
          mv app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/Weatherd-${{ github.ref_name }}.aab

      - name: 'Upload APK to GitHub Releases'
        uses: 'softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228'
        with:
          files: |
            app/build/outputs/apk/release/Weatherd-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/Weatherd-${{ github.ref_name }}.aab
          generate_release_notes: true

      - name: 'Create whatsnew file'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p whatsnew
          bash scripts/release-notes.sh '' '${{ github.ref_name }}' | head -c 500 > whatsnew/whatsnew-en-US

      - name: 'Upload AAB to Google Play'
        uses: 'r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5'
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: 'xyz.attacktive.weatherd'
          releaseFiles: 'app/build/outputs/bundle/release/Weatherd-${{ github.ref_name }}.aab'
          mappingFile: 'app/build/outputs/mapping/release/mapping.txt'
          debugSymbols: 'app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip'
          whatsNewDirectory: 'whatsnew'
          tracks: 'alpha'
          status: 'completed'
