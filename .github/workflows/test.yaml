name: 'Test'
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['**']
permissions:
  contents: 'read'
jobs:
  test:
    name: 'Test'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v7'
      - name: 'Set up JDK'
        uses: 'actions/setup-java@v5'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 'Test'
        run: './gradlew test'
